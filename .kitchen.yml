---
driver:
  name: vagrant

provisioner:
  name: shell
  data_path: ./
  sudo: false

verifier:
  sudo: false
  ruby_bindir: /opt/chefdk/embedded/bin

platforms:
  - name: ubuntu-16.04
  - name: centos-7.2
  - name: centos-6.7

suites:
  - name: default
    provisioner:
      command_prefix: DROPBOX_ACCESS_TOKEN=<%= ENV['DROPBOX_ACCESS_TOKEN'] %>
      script: bootstrap.sh
